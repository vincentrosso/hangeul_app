<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 · Hangeul</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --paper: #f5f0e8;
  --cream: #ede8dc;
  --accent: #c0392b;
  --muted: #7a6f5e;
  --light-muted: #c4b99e;
  --border: #d4c9b0;
  --done: #2d6a4f;
  --native: #1a4a6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,160,120,.12) 27px,rgba(180,160,120,.12) 28px); pointer-events: none; z-index: 0; }

/* HEADER */
header { position: sticky; top: 0; z-index: 100; background: var(--ink); color: var(--paper); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--accent); }
.logo { display: flex; align-items: baseline; gap: 12px; }
.logo-kr { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
.logo-en { font-family: 'Playfair Display', serif; font-size: .85rem; font-style: italic; color: var(--light-muted); }
.progress-summary { font-size: .7rem; color: var(--light-muted); letter-spacing: .1em; text-transform: uppercase; }
.progress-bar-wrap { width: 120px; height: 4px; background: rgba(255,255,255,.15); border-radius: 2px; margin-top: 4px; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s ease; }

/* MAIN */
main { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }
.hero { text-align: center; margin-bottom: 56px; }
.hero-char { font-family: 'Noto Serif KR', serif; font-size: 6rem; font-weight: 700; color: var(--ink); line-height: 1; display: block; animation: fadeDown .8s ease both; cursor: pointer; transition: transform .15s; }
.hero-char:hover { transform: scale(1.05); }
.hero-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-style: italic; color: var(--ink); margin: 12px 0 6px; animation: fadeDown .8s .1s ease both; }
.hero-sub { font-size: .72rem; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; animation: fadeDown .8s .2s ease both; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
.section-label { font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--muted); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 20px; }

/* LESSON LIST */
.lesson-list { display: flex; flex-direction: column; margin-bottom: 48px; }
.lesson-item { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; animation: fadeIn .5s both; }
.lesson-item:hover { background: rgba(192,57,43,.04); }
.lesson-item:hover .lesson-arrow { opacity: 1; transform: translateX(0); }
@keyframes fadeIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.lesson-item:nth-child(1){animation-delay:.1s} .lesson-item:nth-child(2){animation-delay:.15s}
.lesson-item:nth-child(3){animation-delay:.2s}  .lesson-item:nth-child(4){animation-delay:.25s}
.lesson-item:nth-child(5){animation-delay:.3s}  .lesson-item:nth-child(6){animation-delay:.35s}
.lesson-item:nth-child(7){animation-delay:.4s}  .lesson-item:nth-child(8){animation-delay:.45s}
.lesson-num { width: 54px; display: flex; align-items: center; justify-content: center; font-size: .65rem; color: var(--light-muted); flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px 0; }
.lesson-num.done { color: var(--done); }
.lesson-body { flex: 1; padding: 20px 20px 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.lesson-info { flex: 1; }
.lesson-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--ink); margin-bottom: 3px; }
.lesson-kr { font-family: 'Noto Sans KR', sans-serif; font-size: .75rem; color: var(--muted); font-weight: 300; }
.lesson-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.lesson-tag { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
.tag-todo { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
.tag-done { background: rgba(45,106,79,.1); color: var(--done); border: 1px solid rgba(45,106,79,.3); }
.tag-active { background: rgba(192,57,43,.1); color: var(--accent); border: 1px solid rgba(192,57,43,.3); }
.quiz-badge { font-size: .58rem; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; background: rgba(184,134,11,.12); color: #7a5800; border: 1px solid rgba(184,134,11,.3); cursor: pointer; transition: background .15s; }
.quiz-badge:hover { background: rgba(184,134,11,.25); }
.lesson-arrow { font-size: .8rem; color: var(--accent); margin-left: 8px; opacity: 0; transform: translateX(-4px); transition: opacity .2s, transform .2s; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,.75); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.active { display: flex; animation: fadeOv .25s ease; }
@keyframes fadeOv { from{opacity:0} to{opacity:1} }
.modal { background: var(--paper); width: 100%; max-width: 720px; max-height: 88vh; overflow-y: auto; border-radius: 12px 12px 0 0; padding: 32px 28px 48px; animation: slideUp .3s ease; position: relative; }
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-close { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: border-color .15s, color .15s; }
.modal-close:hover { border-color: var(--accent); color: var(--accent); }
.modal-num { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.modal-kr { font-family: 'Noto Sans KR', sans-serif; font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
.modal-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
.modal-tab { padding: 10px 20px; font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.content-section h3 { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

/* CHAR GRID */
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px,1fr)); gap: 10px; margin-bottom: 20px; }
.char-card { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 12px 8px 10px; text-align: center; cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s; position: relative; }
.char-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.09); }
.char-card.playing { border-color: var(--native); background: rgba(26,74,107,.05); }
.char-card.playing .char { color: var(--native); }
.char-card.native-ok .audio-src-dot { background: var(--native); }
.char { font-family: 'Noto Serif KR', serif; font-size: 1.8rem; font-weight: 700; color: var(--ink); display: block; line-height: 1.2; transition: color .15s; }
.romanized { font-size: .65rem; color: var(--muted); letter-spacing: .05em; margin-top: 4px; display: block; }
.example { font-family: 'Noto Sans KR', sans-serif; font-size: .6rem; color: var(--light-muted); margin-top: 2px; display: block; }
.audio-src-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--light-muted); position: absolute; top: 6px; right: 6px; transition: background .3s; }

.lesson-note { background: rgba(192,57,43,.05); border-left: 3px solid var(--accent); padding: 12px 16px; font-size: .8rem; color: var(--ink); line-height: 1.7; border-radius: 0 4px 4px 0; margin-bottom: 20px; }
.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn-complete { flex: 1; padding: 14px; background: var(--ink); color: var(--paper); border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: background .2s; }
.btn-complete:hover { background: var(--accent); }
.btn-complete.done-btn { background: var(--done); pointer-events: none; }
.btn-quiz-launch { padding: 14px 20px; background: var(--cream); color: var(--ink); border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-quiz-launch:hover { background: #e8dfc8; }

/* AUDIO SOURCE LEGEND */
.audio-legend { display: flex; align-items: center; gap: 16px; font-size: .6rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
.legend-native { background: var(--native); }
.legend-tts { background: var(--light-muted); }

/* PAGE FOOTER */
.page-quote { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
.page-quote .kr { font-family: 'Noto Serif KR', serif; font-size: 1.2rem; color: var(--ink); display: block; margin-bottom: 6px; }
.page-quote .en { font-size: .7rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

/* QUIZ OVERLAY */
.quiz-overlay { display: none; position: fixed; inset: 0; background: #151008; z-index: 300; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.quiz-overlay.active { display: flex; animation: fadeOv .3s ease; }
.quiz-header { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid rgba(255,255,255,.07); }
.quiz-header-left { display: flex; flex-direction: column; gap: 8px; }
.quiz-lesson-label { font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3); }
.quiz-dots { display: flex; gap: 5px; flex-wrap: wrap; max-width: 200px; }
.quiz-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.12); transition: background .3s; }
.quiz-dot.seen { background: rgba(255,255,255,.3); }
.quiz-dot.correct { background: #4caf7d; }
.quiz-dot.wrong { background: #c0392b; }
.quiz-progress-text { font-size: .65rem; letter-spacing: .1em; color: rgba(255,255,255,.35); }
.quiz-exit { background: none; border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.35); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: border-color .15s, color .15s; }
.quiz-exit:hover { border-color: var(--accent); color: var(--accent); }
.quiz-mode-toggle { display: flex; border: 1px solid rgba(255,255,255,.1); border-radius: 6px; overflow: hidden; margin-bottom: 28px; }
.qm-btn { flex: 1; padding: 9px 16px; background: none; color: rgba(255,255,255,.3); border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: .63rem; letter-spacing: .12em; text-transform: uppercase; transition: background .15s, color .15s; }
.qm-btn + .qm-btn { border-left: 1px solid rgba(255,255,255,.1); }
.qm-btn.active { background: rgba(255,255,255,.09); color: #fff; }

/* FLASHCARD */
.quiz-stage { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
.flashcard { width: 100%; aspect-ratio: 3/2; position: relative; cursor: pointer; perspective: 1000px; margin-bottom: 24px; }
.flashcard-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,.2,.2,1); }
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
.card-front { background: #1e1810; border: 1px solid rgba(255,255,255,.07); }
.card-back  { background: #142014; border: 1px solid rgba(76,175,125,.25); transform: rotateY(180deg); }
.card-back.missed { background: #201010; border-color: rgba(192,57,43,.25); }
.card-hint { font-size: .58rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.18); margin-bottom: 14px; }
.card-big-char { font-family: 'Noto Serif KR', serif; font-size: 5rem; font-weight: 700; color: #fff; line-height: 1; }

/* Native audio button — prominent */
.card-audio-row { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
.card-native-btn { background: rgba(26,74,107,.6); border: 1px solid rgba(100,160,210,.4); color: rgba(160,210,255,.9); padding: 6px 14px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .08em; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
.card-native-btn:hover, .card-native-btn.speaking { background: rgba(26,74,107,.9); border-color: rgba(100,160,210,.7); color: #fff; }
.card-tts-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.3); padding: 6px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .06em; cursor: pointer; transition: all .15s; }
.card-tts-btn:hover { border-color: rgba(255,255,255,.25); color: rgba(255,255,255,.6); }

.card-result-glyph { font-size: 1.8rem; margin-bottom: 6px; }
.card-romanized { font-size: 1.6rem; color: #fff; letter-spacing: .04em; margin-bottom: 6px; }
.card-example-text { font-family: 'Noto Sans KR', sans-serif; font-size: .8rem; color: rgba(255,255,255,.4); }
.verdict-row { display: flex; gap: 10px; width: 100%; }
.verdict-btn { flex: 1; padding: 13px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border: none; transition: opacity .15s; }
.verdict-missed { background: rgba(192,57,43,.2); color: #e07a72; }
.verdict-got-it  { background: rgba(76,175,125,.2); color: #7ddcaa; }
.verdict-missed:hover, .verdict-got-it:hover { opacity: .78; }
.btn-advance { width: 100%; padding: 13px; border-radius: 7px; background: rgba(255,255,255,.07); color: rgba(255,255,255,.55); font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border: none; transition: background .15s; }
.btn-advance:hover { background: rgba(255,255,255,.13); }
.btn-advance.primary { background: var(--accent); color: #fff; }
.btn-advance.primary:hover { opacity: .88; }
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 16px; }
.choice-btn { padding: 15px 10px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); color: rgba(255,255,255,.7); font-family: 'DM Mono', monospace; font-size: .88rem; cursor: pointer; transition: background .12s, border-color .12s, color .12s; text-align: center; }
.choice-btn:hover:not(:disabled) { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.28); color: #fff; }
.choice-btn.is-correct { background: rgba(76,175,125,.18); border-color: #4caf7d; color: #7ddcaa; }
.choice-btn.is-wrong   { background: rgba(192,57,43,.18); border-color: var(--accent); color: #e07a72; }
.choice-btn:disabled { cursor: default; }

/* Native audio panel in choice mode */
.choice-audio-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }

/* RESULT */
.quiz-result { display: none; text-align: center; animation: fadeDown .4s ease both; }
.result-stars { font-size: 2.2rem; letter-spacing: 8px; margin-bottom: 16px; }
.result-score { font-family: 'Noto Serif KR', serif; font-size: 5rem; color: #fff; font-weight: 700; line-height: 1; }
.result-pct   { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3); margin: 8px 0 28px; }
.result-msg   { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; color: rgba(255,255,255,.65); margin-bottom: 32px; }
.result-actions { display: flex; gap: 12px; justify-content: center; }
.result-btn { padding: 12px 24px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; border: none; }
.result-retry { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
.result-retry:hover { background: rgba(255,255,255,.14); }
.result-close { background: var(--accent); color: #fff; }
.result-close:hover { opacity: .88; }

/* TOAST */
.tts-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 20px; font-size: .65rem; letter-spacing: .1em; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.tts-toast.native { background: var(--native); color: #c8e8ff; }
.tts-toast.tts    { background: var(--ink); color: rgba(255,255,255,.7); }
.tts-toast.visible { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-kr">한글</span><span class="logo-en">Hangeul</span></div>
  <div style="text-align:right">
    <div class="progress-summary" id="progressText">0 / 8 lessons</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <div class="hero">
    <span class="hero-char" id="heroChar" title="Click to hear">가</span>
    <h1 class="hero-title">The Korean Alphabet</h1>
    <p class="hero-sub">Learn to read & write in 8 lessons</p>
  </div>
  <div class="section-label">Curriculum · 교과 과정</div>
  <div class="lesson-list" id="lessonList"></div>
  <div class="page-quote">
    <span class="kr">천 리 길도 한 걸음부터</span>
    <span class="en">A journey of a thousand miles begins with a single step</span>
  </div>
</main>

<!-- LESSON MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- QUIZ OVERLAY -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-header">
    <div class="quiz-header-left">
      <div class="quiz-lesson-label" id="quizLabel"></div>
      <div class="quiz-dots" id="quizDots"></div>
    </div>
    <div class="quiz-progress-text" id="quizProgress"></div>
    <button class="quiz-exit" id="quizExit">✕</button>
  </div>
  <div class="quiz-mode-toggle" id="modeToggle">
    <button class="qm-btn active" data-mode="flashcard">↩ Flashcard</button>
    <button class="qm-btn" data-mode="choice">⊞ Multiple Choice</button>
  </div>

  <!-- FLASHCARD -->
  <div class="quiz-stage" id="stageFlash">
    <div class="flashcard" id="flashcard">
      <div class="flashcard-inner">
        <div class="card-face card-front">
          <div class="card-hint">tap card to reveal</div>
          <div class="card-big-char" id="fcChar"></div>
          <div class="card-audio-row">
            <button class="card-native-btn" id="fcNativeBtn">🎙 Native</button>
            <button class="card-tts-btn"    id="fcTtsBtn">🔊 TTS</button>
          </div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="card-result-glyph" id="fcGlyph"></div>
          <div class="card-romanized" id="fcRoman"></div>
          <div class="card-example-text" id="fcEx"></div>
        </div>
      </div>
    </div>
    <div class="verdict-row" id="verdictRow" style="display:none">
      <button class="verdict-btn verdict-missed" id="fcMissed">✗ Missed it</button>
      <button class="verdict-btn verdict-got-it" id="fcGotIt">✓ Got it</button>
    </div>
    <button class="btn-advance" id="fcNext" style="display:none"></button>
  </div>

  <!-- CHOICE -->
  <div class="quiz-stage" id="stageChoice" style="display:none">
    <div class="flashcard" style="cursor:default">
      <div class="flashcard-inner">
        <div class="card-face card-front" style="cursor:default">
          <div class="card-hint">What is the romanization?</div>
          <div class="card-big-char" id="chChar"></div>
          <div class="card-audio-row">
            <button class="card-native-btn" id="chNativeBtn">🎙 Native</button>
            <button class="card-tts-btn"    id="chTtsBtn">🔊 TTS</button>
          </div>
        </div>
      </div>
    </div>
    <div class="choice-grid" id="choiceGrid"></div>
    <button class="btn-advance primary" id="chNext" style="display:none"></button>
  </div>

  <!-- RESULT -->
  <div class="quiz-result" id="quizResult">
    <div class="result-stars" id="rStars"></div>
    <div class="result-score" id="rScore"></div>
    <div class="result-pct"   id="rPct"></div>

<div class="tts-toast" id="ttsToast"></div>

<script>
/* ============================================================
   NATIVE AUDIO MAP
   Wikimedia Commons Ko-*.ogg — real native Korean speakers
   URL pattern: https://commons.wikimedia.org/wiki/Special:FilePath/Ko-WORD.ogg
   Fallback: Web Speech API TTS
   ============================================================ */

const WM = (word) =>
  `https://commons.wikimedia.org/wiki/Special:FilePath/Ko-${encodeURIComponent(word)}.ogg`;

// Hand-verified Wikimedia Commons Korean audio files (CC-BY-SA)
// Value = filename stem after "Ko-" (without .ogg)
const NATIVE_MAP = {
  // Common words with confirmed Ko-*.ogg files
  "사랑":  "사랑",
  "한국":  "한국",
  "사람":  "사람",
  "음식":  "음식",
  "학교":  "학교",
  "친구":  "친구",
  "가족":  "가족",
  "밥":    "밥",
  "물":    "물",
  "책":    "책",
  "봄":    "봄",
  "강":    "강",
  "산":    "산",
  "나무":  "나무",
  "하늘":  "하늘",
  "가방":  "가방",
  "바다":  "바다",
  "마음":  "마음",
  "여자":  "여자",
  "아이":  "아이",
  "이름":  "이름",
  "여행":  "여행",
  "요리":  "요리",
  "유리":  "유리",
  "우유":  "우유",
  "의사":  "의사",
  "외국":  "외국",
  "닭":    "닭",
  "가":    "가",
  "나":    "나",
  "다":    "다",
  "라":    "라",
  "마":    "마",
  "바":    "바",
  "사":    "사",
  "아":    "아",
  "자":    "자",
  "하":    "하",
  "카":    "카",
  "타":    "타",
  "파":    "파",
  "차":    "차",
};

function nativeUrl(word) {
  const key = NATIVE_MAP[word];
  return key ? WM(key) : null;
}

/* ============================================================
   AUDIO ENGINE
   ============================================================ */
const toast = document.getElementById('ttsToast');
let toastTimer;
let currentAudio = null;
let activeSpeakBtn = null;

function showToast(text, type) {
  clearTimeout(toastTimer);
  toast.textContent = text;
  toast.className = `tts-toast ${type} visible`;
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 2000);
}

function stopAllAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (activeSpeakBtn) { activeSpeakBtn.classList.remove('speaking'); activeSpeakBtn = null; }
}

function playNative(word, btn, onFail) {
  const url = nativeUrl(word);
  if (!url) { if (onFail) onFail(); return; }

  stopAllAudio();
  const audio = new Audio(url);
  currentAudio = audio;
  if (btn) { activeSpeakBtn = btn; btn.classList.add('speaking'); }

  audio.onplay = () => showToast('🎙 Native speaker', 'native');
  audio.onended = () => {
    currentAudio = null;
    if (btn) btn.classList.remove('speaking');
    toast.classList.remove('visible');
  };
  audio.onerror = () => {
    currentAudio = null;
    if (btn) btn.classList.remove('speaking');
    if (onFail) onFail();
    else playTTS(word, btn);
  };
  audio.play().catch(() => {
    currentAudio = null;
    if (btn) btn.classList.remove('speaking');
    if (onFail) onFail();
    else playTTS(word, btn);
  });
}

function playTTS(word, btn, onEnd) {
  if (!window.speechSynthesis) return;
  stopAllAudio();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'ko-KR'; u.rate = 0.85; u.pitch = 1;
  const voices = speechSynthesis.getVoices();
  const kr = voices.find(v => v.lang && v.lang.startsWith('ko'));
  if (kr) u.voice = kr;
  if (btn) { activeSpeakBtn = btn; btn.classList.add('speaking'); }
  u.onstart = () => showToast('🔊 Text-to-speech', 'tts');
  u.onend = u.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    toast.classList.remove('visible');
    if (onEnd) onEnd();
  };
  speechSynthesis.speak(u);
}

// Try native first, fall back to TTS
function playBest(word, btn) {
  if (nativeUrl(word)) {
    playNative(word, btn, () => playTTS(word, btn));
  } else {
    playTTS(word, btn);
  }
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

const LESSONS = [

    chars:[

  { num:5, title:"\"Y\" in Hangeul", kr:"한글의 'Y' 소리",
    note:"No standalone 'Y' letter — an extra stroke added to a vowel creates the Y-glide. ㅏ→ㅑ (a→ya). One stroke becomes two.",
    chars:[
      {c:"야",r:"ya",  ex:"야채 (vegetable)"},
      {c:"여",r:"yeo", ex:"여행 (travel)"},
      {c:"요",r:"yo",  ex:"요가 (yoga)"},
      {c:"유",r:"yu",  ex:"유행 (trend)"},
      {c:"얘",r:"yae", ex:"얘기 (talk)"},

    chars:[
      {c:"닭",r:"dak",   ex:"닭 (chicken)"},

    chars:[
      {c:"한국",r:"han-guk",  ex:"Korea"},

    chars:[

const ALL_CHARS = LESSONS.flatMap(l => l.chars);

/* ============================================================
   STATE
   ============================================================ */
let completed = JSON.parse(localStorage.getItem('hangul-done') || '[]');
function saveCompleted() { localStorage.setItem('hangul-done', JSON.stringify(completed)); }
function updateProgress() {
  const pct = Math.round(completed.length / LESSONS.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.length} / ${LESSONS.length} lessons`;
  document.getElementById('heroChar').textContent = HERO_CHARS[Math.min(completed.length, HERO_CHARS.length-1)];
}

// Hero char click
document.getElementById('heroChar').addEventListener('click', () => {
  const ch = document.getElementById('heroChar').textContent;
  playBest(ch, document.getElementById('heroChar'));
});

/* ============================================================
   LESSON LIST
   ============================================================ */
function renderList() {
  const list = document.getElementById('lessonList');
  list.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const isDone = completed.includes(lesson.num);
    const isNext = !isDone && (i===0 || completed.includes(LESSONS[i-1].num));
    const el = document.createElement('div');
    el.className = 'lesson-item';
    el.innerHTML = `
      <div class="lesson-num ${isDone?'done':''}">${isDone?'✓':String(lesson.num).padStart(2,'0')}</div>
      <div class="lesson-body">
        <div class="lesson-info">
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-kr">${lesson.kr}</div>
        </div>
        <div class="lesson-meta">
          <span class="quiz-badge" data-num="${lesson.num}">Quiz ↗</span>
          <span class="lesson-tag ${isDone?'tag-done':isNext?'tag-active':'tag-todo'}">${isDone?'Done':isNext?'Up next':'Locked'}</span>
        </div>
        <span class="lesson-arrow">→</span>
      </div>`;
    el.querySelector('.quiz-badge').addEventListener('click', e => { e.stopPropagation(); openQuiz(lesson); });
    el.addEventListener('click', () => openLesson(lesson));
    list.appendChild(el);
  });
}

/* ============================================================
   LESSON MODAL
   ============================================================ */
function charCardHTML(ch) {
  const hasNative = !!nativeUrl(ch.c);
  return `
    <div class="char-card" data-char="${ch.c}">
      <div class="audio-src-dot ${hasNative?'native-ok':''}"></div>
      <span class="char">${ch.c}</span>
      <span class="romanized">${ch.r}</span>
      <span class="example">${ch.ex}</span>
    </div>`;
}

function openLesson(lesson) {
  const isDone = completed.includes(lesson.num);
  const nativeCount = lesson.chars.filter(ch => !!nativeUrl(ch.c)).length;
  const mc = document.getElementById('modalContent');
  mc.innerHTML = `
    <div class="modal-num">Lesson ${lesson.num} · ${LESSONS.length}</div>
    <div class="modal-title">${lesson.title}</div>
    <div class="modal-kr">${lesson.kr}</div>
    <div class="lesson-note">${lesson.note}</div>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="study">Study</div>
      <div class="modal-tab" data-tab="quiz">Quiz</div>
    </div>
    <div class="tab-panel active" id="tabStudy">
      <div class="content-section">
        <h3>Characters · 글자</h3>
        <div class="audio-legend">
          <span><span class="legend-dot legend-native"></span>Native audio available</span>
          <span><span class="legend-dot legend-tts"></span>TTS only</span>
          <span style="margin-left:auto;color:var(--light-muted)">${nativeCount}/${lesson.chars.length} native</span>
        </div>
        <div class="char-grid">${lesson.chars.map(charCardHTML).join('')}</div>
      </div>
      <div class="btn-row">
        <button class="btn-quiz-launch" id="modalQuizBtn">Quiz this lesson →</button>
        <button class="btn-complete ${isDone?'done-btn':''}" id="completeBtn">
          ${isDone?'✓ Completed':'Mark as Complete'}
        </button>
      </div>
    </div>
    <div class="tab-panel" id="tabQuiz">
      <div style="text-align:center;padding:28px 0">
        <div style="font-family:'Noto Serif KR',serif;font-size:3.5rem;margin-bottom:12px">${lesson.chars[0].c}</div>
        <p style="color:var(--muted);font-size:.8rem;line-height:1.7;margin-bottom:24px">
          Test yourself on all ${lesson.chars.length} characters.<br>Flashcard or multiple-choice mode.
        </p>
        <button class="btn-quiz-launch" id="tabQuizBtn" style="display:inline-block;padding:14px 28px">Start Quiz →</button>
      </div>
    </div>`;

  mc.querySelectorAll('.modal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      mc.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
      mc.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab'+tab.dataset.tab.charAt(0).toUpperCase()+tab.dataset.tab.slice(1)).classList.add('active');
    });
  });

  mc.querySelectorAll('.char-card').forEach(card => {
    card.addEventListener('click', () => {
      stopAllAudio();
      card.classList.add('playing');
      playBest(card.dataset.char, null);
      // remove playing after short delay
      setTimeout(() => card.classList.remove('playing'), 1800);
    });
  });

  const launch = () => { closeModal(); openQuiz(lesson); };
  mc.querySelector('#modalQuizBtn').addEventListener('click', launch);
  mc.querySelector('#tabQuizBtn').addEventListener('click', launch);

  if (!isDone) {
    mc.querySelector('#completeBtn').addEventListener('click', () => {
      if (!completed.includes(lesson.num)) { completed.push(lesson.num); saveCompleted(); updateProgress(); renderList(); }
      mc.querySelector('#completeBtn').textContent = '✓ Completed';
      mc.querySelector('#completeBtn').classList.add('done-btn');
    });
  }
  document.getElementById('overlay').classList.add('active');
}

document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeModal(); });
document.getElementById('modalClose').addEventListener('click', closeModal);
function closeModal() { document.getElementById('overlay').classList.remove('active'); stopAllAudio(); }

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
let Q = { lesson:null, cards:[], idx:0, correct:0, mode:'flashcard', flipped:false, answered:false };

function openQuiz(lesson) { Q.lesson=lesson; Q.mode='flashcard'; syncModeToggle(); startQuiz(); }

function startQuiz() {
  Q.cards=[...Q.lesson.chars].sort(()=>Math.random()-.5);
  Q.idx=0; Q.correct=0; Q.flipped=false; Q.answered=false;
  document.getElementById('quizLabel').textContent=`Lesson ${Q.lesson.num} · ${Q.lesson.title}`;
  buildDots();
  document.getElementById('quizResult').style.display='none';
  document.getElementById('modeToggle').style.display='flex';
  if (Q.mode==='flashcard') {
    document.getElementById('stageFlash').style.display='flex';
    document.getElementById('stageChoice').style.display='none';
    showFlashcard();
  } else {
    document.getElementById('stageFlash').style.display='none';
    document.getElementById('stageChoice').style.display='flex';
    showChoice();
  }
  document.getElementById('quizOverlay').classList.add('active');
}

function buildDots() {
  document.getElementById('quizDots').innerHTML=Q.cards.map((_,i)=>`<div class="quiz-dot" id="dot${i}"></div>`).join('');
}
function dot(i,s) { const d=document.getElementById('dot'+i); if(d) d.classList.add(s); }
function tickP() { document.getElementById('quizProgress').textContent=`${Q.idx+1} / ${Q.cards.length}`; }

/* ─ FLASHCARD ─ */
function showFlashcard() {
  Q.flipped=false; Q.answered=false;
  const card=Q.cards[Q.idx];
  document.getElementById('fcChar').textContent=card.c;
  document.getElementById('fcRoman').textContent=card.r;
  document.getElementById('fcEx').textContent=card.ex;
  document.getElementById('fcGlyph').textContent='';
  document.getElementById('cardBack').classList.remove('missed');
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('verdictRow').style.display='none';
  document.getElementById('fcNext').style.display='none';

  // Style Native button based on availability
  const nb = document.getElementById('fcNativeBtn');
  if (nativeUrl(card.c)) {
    nb.style.opacity='1'; nb.style.pointerEvents='auto';
    nb.title='Play native speaker recording';
  } else {
    nb.style.opacity='.35'; nb.style.pointerEvents='none';
    nb.title='No native recording for this character';
  }

  dot(Q.idx,'seen'); tickP();
}

document.getElementById('flashcard').addEventListener('click', () => {
  if (Q.answered || Q.flipped) return;
  Q.flipped=true;
  document.getElementById('flashcard').classList.add('flipped');
  playBest(Q.cards[Q.idx].c, null); // auto-play on flip
  document.getElementById('verdictRow').style.display='flex';
});

document.getElementById('fcNativeBtn').addEventListener('click', e => {
  e.stopPropagation();
  playNative(Q.cards[Q.idx].c, e.currentTarget, () => playTTS(Q.cards[Q.idx].c, null));
});
document.getElementById('fcTtsBtn').addEventListener('click', e => {
  e.stopPropagation();
  playTTS(Q.cards[Q.idx].c, e.currentTarget);
});

document.getElementById('fcMissed').addEventListener('click', () => {
  Q.answered=true;
  document.getElementById('fcGlyph').textContent='✗';
  document.getElementById('cardBack').classList.add('missed');
  dot(Q.idx,'wrong'); showAdvance();
});
document.getElementById('fcGotIt').addEventListener('click', () => {
  Q.answered=true; Q.correct++;
  document.getElementById('fcGlyph').textContent='✓';
  dot(Q.idx,'correct'); showAdvance();
});
function showAdvance() {
  document.getElementById('verdictRow').style.display='none';
  const btn=document.getElementById('fcNext');
  btn.style.display='block';
  const last=Q.idx>=Q.cards.length-1;
  btn.textContent=last?'See Results':'Next →';
  btn.className='btn-advance'+(last?'':' primary');
}
document.getElementById('fcNext').addEventListener('click', advance);

/* ─ CHOICE ─ */
function showChoice() {
  Q.answered=false;
  const card=Q.cards[Q.idx];
  document.getElementById('chChar').textContent=card.c;
  document.getElementById('chNext').style.display='none';

  const nb=document.getElementById('chNativeBtn');
  if (nativeUrl(card.c)) { nb.style.opacity='1'; nb.style.pointerEvents='auto'; }
  else { nb.style.opacity='.35'; nb.style.pointerEvents='none'; }

  dot(Q.idx,'seen'); tickP();

  const wrongPool=ALL_CHARS.filter(ch=>ch.r!==card.r);
  const seen=new Set();
  const wrongs=wrongPool.sort(()=>Math.random()-.5).filter(ch=>{ if(seen.has(ch.r)) return false; seen.add(ch.r); return true; }).slice(0,3);
  const opts=[...wrongs,card].sort(()=>Math.random()-.5);
  const grid=document.getElementById('choiceGrid');
  grid.innerHTML='';
  opts.forEach(opt => {
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=opt.r;
    btn.addEventListener('click',()=>handleChoice(btn,opt.r===card.r,card));
    grid.appendChild(btn);
  });
}

document.getElementById('chNativeBtn').addEventListener('click', e => {
  e.stopPropagation();
  playNative(Q.cards[Q.idx].c, e.currentTarget, ()=>playTTS(Q.cards[Q.idx].c, null));
});
document.getElementById('chTtsBtn').addEventListener('click', e => {
  e.stopPropagation();
  playTTS(Q.cards[Q.idx].c, e.currentTarget);
});

function handleChoice(btn,isCorrect,card) {
  if(Q.answered) return;
  Q.answered=true;
  document.querySelectorAll('#choiceGrid .choice-btn').forEach(b=>{ b.disabled=true; if(b.textContent===card.r) b.classList.add('is-correct'); });
  if(!isCorrect) { btn.classList.add('is-wrong'); dot(Q.idx,'wrong'); }
  else { Q.correct++; dot(Q.idx,'correct'); }
  playBest(card.c, null); // auto play after answer
  const nb=document.getElementById('chNext');
  nb.style.display='block';
  nb.textContent=Q.idx>=Q.cards.length-1?'See Results':'Next →';
}
document.getElementById('chNext').addEventListener('click', advance);

function advance() { Q.idx++; if(Q.idx>=Q.cards.length){showResult();return;} if(Q.mode==='flashcard') showFlashcard(); else showChoice(); }

/* ─ RESULT ─ */
function showResult() {
  stopAllAudio();
  document.getElementById('stageFlash').style.display='none';
  document.getElementById('stageChoice').style.display='none';
  document.getElementById('modeToggle').style.display='none';
  const total=Q.cards.length, pct=Math.round(Q.correct/total*100);
  let stars='★★★', msg='완벽해요! Perfect score!';
  if(pct<100){stars='★★☆'; msg='잘했어요! Almost there.';}
  if(pct<70) {stars='★☆☆'; msg='괜찮아요. Keep going!';}
  document.getElementById('rStars').textContent=stars;
  document.getElementById('rScore').textContent=`${Q.correct}/${total}`;
  document.getElementById('rPct').textContent=`${pct}% correct`;
  document.getElementById('rMsg').textContent=msg;
  document.getElementById('quizResult').style.display='block';
  if(pct>=70 && !completed.includes(Q.lesson.num)) { completed.push(Q.lesson.num); saveCompleted(); updateProgress(); renderList(); }
}

document.getElementById('retryBtn').addEventListener('click', ()=>{ document.getElementById('quizResult').style.display='none'; startQuiz(); });
document.getElementById('closeDoneBtn').addEventListener('click', closeQuiz);
document.getElementById('quizExit').addEventListener('click', closeQuiz);
function closeQuiz() { document.getElementById('quizOverlay').classList.remove('active'); stopAllAudio(); }

function syncModeToggle() { document.querySelectorAll('.qm-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===Q.mode)); }
document.querySelectorAll('.qm-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{ Q.mode=btn.dataset.mode; syncModeToggle(); document.getElementById('quizResult').style.display='none'; startQuiz(); });
});

/* ============================================================
   INIT
   ============================================================ */
updateProgress();
renderList();
</script>
</body>
</html>
